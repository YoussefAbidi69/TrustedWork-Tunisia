<div class="page animate-fade-in">
    <app-recruitment-card [title]="isEditMode ? 'Edit Job Position' : 'Create Job Position'"
        subtitle="Fill in the details below" icon="💼">

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">

            <!-- Title -->
            <div class="form-group full-width">
                <label for="titre">Title *</label>
                <input id="titre" formControlName="titre" placeholder="e.g. Senior Angular Developer" />
            </div>

            <!-- Description -->
            <div class="form-group full-width">

                <div class="label-row">
                    <label for="description">Description *</label>

                    <!-- ============================= -->
                    <!-- 🚀 PHASE 2 : GEMINI AI -->
                    <!--
                    <button
                        *ngIf="isEditMode"
                        type="button"
                        class="btn-ai"
                        [disabled]="aiLoading"
                        (click)="generateDescription()">

                        <span *ngIf="!aiLoading">
                            ✨ Générer avec Gemini
                        </span>

                        <span *ngIf="aiLoading">
                            ⏳ Génération en cours...
                        </span>

                    </button>

                    <span *ngIf="!isEditMode" class="ai-hint">
                        💡 Sauvegardez d'abord pour utiliser l'IA
                    </span>
                    -->
                    <!-- ============================= -->

                </div>

                <textarea id="description" formControlName="description" rows="5" placeholder="Job description...">
                </textarea>

            </div>

            <!-- Contract Type -->
            <div class="form-group">
                <label for="typeContrat">Contract Type *</label>
                <select id="typeContrat" formControlName="typeContrat">
                    <option *ngFor="let type of contractTypes" [value]="type">
                        {{ type }}
                    </option>
                </select>
            </div>

            <!-- Status -->
            <div class="form-group">
                <label for="status">Status *</label>
                <select id="status" formControlName="status">
                    <option *ngFor="let s of statuses" [value]="s">
                        {{ s }}
                    </option>
                </select>
            </div>

            <!-- Salary -->
            <div class="form-group">
                <label for="salaireMin">Min Salary (TND) *</label>
                <input id="salaireMin" type="number" formControlName="salaireMin" />
            </div>

            <div class="form-group">
                <label for="salaireMax">Max Salary (TND) *</label>
                <input id="salaireMax" type="number" formControlName="salaireMax" />
            </div>

            <!-- Location -->
            <div class="form-group">
                <label for="localisation">Location *</label>
                <input id="localisation" formControlName="localisation" placeholder="e.g. Tunis, Lac 2" />
            </div>

            <!-- Remote -->
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" formControlName="remote" />
                    <span>Remote Position</span>
                </label>
            </div>

            <!-- Experience -->
            <div class="form-group">
                <label for="experienceRequiseAns">Experience (years) *</label>
                <input id="experienceRequiseAns" type="number" formControlName="experienceRequiseAns" />
            </div>

            <!-- Skills -->
            <div class="form-group">
                <label for="skillsRequis">Skills *</label>
                <input id="skillsRequis" formControlName="skillsRequis" placeholder="Angular, Spring Boot, Docker" />
            </div>

            <!-- Deadline -->
            <div class="form-group">
                <label for="deadline">Deadline *</label>
                <input id="deadline" type="date" formControlName="deadline" />
            </div>

            <!-- Candidatures -->
            <div class="form-group" *ngIf="isEditMode">
                <label for="nombreCandidatures">Candidatures reçues</label>
                <input id="nombreCandidatures" type="number" formControlName="nombreCandidatures" readonly
                    class="input-readonly" />
            </div>

            <!-- Actions -->
            <div class="form-actions full-width">

                <button type="button" class="btn btn-outline" routerLink="/recruitment/job-positions">
                    Cancel
                </button>

                <app-button-primary icon="💾" [loading]="loading" [disabled]="form.invalid">

                    {{ isEditMode ? 'Save Changes' : 'Create Position' }}

                </app-button-primary>

            </div>

        </form>
    </app-recruitment-card>
</div>
