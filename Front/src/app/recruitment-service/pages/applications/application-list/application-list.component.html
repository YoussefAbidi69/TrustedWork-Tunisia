<div class="page animate-fade-in">
    <app-recruitment-card title="Applications" subtitle="Track all recruitment applications" icon="📋"
        [padding]="false">

        <div card-actions>
            <app-button-primary icon="➕" (onClick)="onCreate()">New Application</app-button-primary>
        </div>

        <!-- Filters bar -->
        <div class="filters-bar">
            <input class="search-input" type="text" placeholder="🔍 Search by job ID, freelancer ID, availability..."
                (input)="onSearch($any($event.target).value)" />
            <select class="filter-select" (change)="onFilterStatus($any($event.target).value)">
                <option *ngFor="let s of statusOptions" [value]="s">
                    {{ s || 'All Statuses' }}
                </option>
            </select>
        </div>

        <app-recruitment-table [columns]="columns" [data]="filtered" [loading]="loading" (onView)="onView($event)"
            (onEdit)="onEdit($event)" (onDelete)="onDelete($event)">
        </app-recruitment-table>

    </app-recruitment-card>
</div>
