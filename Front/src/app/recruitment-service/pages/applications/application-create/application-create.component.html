<div class="page animate-fade-in">
    <app-recruitment-card [title]="title" [subtitle]="subtitle" icon="📋">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-grid">

            <div class="form-group">
                <label for="jobPositionId">Job Position *</label>

                <select id="jobPositionId" formControlName="jobPositionId">
                    <option value="">Select a job position</option>

                    <option *ngFor="let job of jobPositions" [value]="job.id">
                        {{ job.titre }} - {{ job.localisation }}
                    </option>

                </select>

                <span class="field-error"
                    *ngIf="form.get('jobPositionId')?.invalid && form.get('jobPositionId')?.touched">
                    Job Position is required
                </span>
            </div>

            <div class="form-group">
                <label for="disponibilite">Availability *</label>
                <input id="disponibilite" formControlName="disponibilite"
                    placeholder="e.g. Immediate, 2 weeks notice" />
                <span class="field-error"
                    *ngIf="form.get('disponibilite')?.invalid && form.get('disponibilite')?.touched">
                    Availability is required
                </span>
            </div>

            <div class="form-group">
                <label for="pretentionSalariale">Expected Salary (TND) *</label>
                <input id="pretentionSalariale" type="number" formControlName="pretentionSalariale" placeholder="0"
                    min="0" />
            </div>

            <div class="form-group" *ngIf="isEdit">
                <label for="status">Status</label>
                <select id="status" formControlName="status">
                    <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label for="lettreMotivation">Cover Letter *</label>
                <textarea id="lettreMotivation" formControlName="lettreMotivation" rows="6"
                    placeholder="Write your motivation letter (minimum 50 characters)..."></textarea>
                <span class="field-error"
                    *ngIf="form.get('lettreMotivation')?.invalid && form.get('lettreMotivation')?.touched">
                    Cover letter must be at least 50 characters
                </span>
            </div>

            <div class="phase-info full-width">
                <span class="info-badge">ℹ️ Phase 1</span>
                <span class="info-text">freelancerId=1 · entrepriseId=2 · matchingScore=75 sont définis
                    automatiquement</span>
            </div>

            <div class="form-actions full-width">
                <button type="button" class="btn btn-outline" routerLink="/recruitment/applications">Cancel</button>
                <app-button-primary icon="📨" [loading]="loading" [disabled]="form.invalid">
                    {{ submitLabel }}
                </app-button-primary>
            </div>

        </form>
    </app-recruitment-card>
</div>
