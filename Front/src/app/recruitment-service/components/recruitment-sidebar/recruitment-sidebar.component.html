<aside class="sidebar" [class.collapsed]="collapsed">
    <!-- Logo -->
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text" *ngIf="!collapsed">TrustedWork</span>
        </div>
        <button class="toggle-btn" (click)="toggleSidebar()">
            <span *ngIf="!collapsed">◀</span>
            <span *ngIf="collapsed">▶</span>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <a *ngFor="let item of navItems" [routerLink]="item.route" class="nav-item"
            [class.active]="isActive(item.route)" [title]="item.label">
            <span class="nav-icon">{{ item.icon }}</span>
            <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
        </a>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer" *ngIf="!collapsed">
        <div class="footer-badge">
            <span class="badge-dot"></span>
            <span class="badge-text">Recruitment Module</span>
        </div>
    </div>
</aside>
