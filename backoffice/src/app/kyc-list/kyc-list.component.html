<div class="page-top">
    <h2>KYC — Vérifications en attente</h2>
    <span class="count-badge purple">{{ pendingUsers.length }} en attente</span>
</div>

<div class="loading" *ngIf="loading">Chargement...</div>

<div class="kyc-grid" *ngIf="!loading && pendingUsers.length > 0">
    <div class="kyc-card" *ngFor="let u of pendingUsers">
        <div class="kyc-top">
<div class="kyc-avatar">{{ u.firstName.charAt(0) }}{{ u.lastName.charAt(0) }}</div>            <div class="kyc-info">
                <div class="kyc-name">{{ u.firstName }} {{ u.lastName }}</div>
                <div class="kyc-email">{{ u.email }}</div>
                <span class="badge r-{{u.role}}">{{ u.role }}</span>
            </div>
            <span class="badge k-IN_REVIEW">IN_REVIEW</span>
        </div>
        <div class="kyc-actions">
            <button class="btn-approve" (click)="approve(u)" [disabled]="actionLoading === u.id">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Approuver
            </button>
            <button class="btn-reject" (click)="reject(u)" [disabled]="actionLoading === u.id">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Rejeter
            </button>
        </div>
    </div>
</div>

<div class="empty" *ngIf="!loading && pendingUsers.length===0">Aucune vérification KYC en attente</div>
