<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">TW</div>
            <h1>TrustedWork</h1>
            <p>Réinitialiser le mot de passe</p>
        </div>

        <div class="alert success" *ngIf="successMessage">
            {{ successMessage }}
            <div style="margin-top: 12px;">
                <a routerLink="/login" class="reset-link-btn">Se connecter</a>
            </div>
        </div>
        <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <div class="alert error" *ngIf="!token && !successMessage">
            Token manquant. <a routerLink="/forgot-password" style="color: #22D3EE;">Demander un nouveau lien</a>
        </div>

        <div *ngIf="token && !successMessage">
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" [(ngModel)]="newPassword" placeholder="Minimum 8 caractères">
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirmer">
            </div>
            <button class="primary-btn" (click)="submit()" [disabled]="loading">
                {{ loading ? 'Traitement...' : 'Réinitialiser' }}
            </button>
        </div>

        <div class="back-link">
            <a routerLink="/login">← Retour à la connexion</a>
        </div>
    </div>
</div>
