spring.application.name=review-service

server.port=8085

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/trustedwork_review_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# LOGGING
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# SWAGGER / OPENAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# LOGGING enhanced
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# FEIGN
spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# SCHEDULER
spring.task.scheduling.pool.size=5

# HUGGING FACE AI
huggingface.api.token=YOUR_TOKEN_HERE
huggingface.api.url=https://router.huggingface.co/v1/chat/completions
huggingface.api.model=katanemo/Arch-Router-1.5B:hf-inference
