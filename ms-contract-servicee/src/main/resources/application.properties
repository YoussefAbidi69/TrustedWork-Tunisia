spring.application.name=ms-contract-servicee
server.port=8083
# User Service Configuration
user.service.url=http://localhost:8081/api
internal.api.key=${INTERNAL_API_KEY:change-me}
# Database
spring.datasource.url=jdbc:mysql://localhost:3306/trustedwork_contract_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Jackson (helpful for Angular forms sending empty strings)
spring.jackson.deserialization.accept-empty-string-as-null-object=true
spring.jackson.deserialization.fail-on-unknown-properties=false

payment.simulation.enabled=true

# Contract creation rules
# Set to false in dev if you want to allow creating contracts with freelancers whose KYC is still PENDING.
contract.creation.requireFreelancerKycApproved=false
