<header class="premium-navbar">
  <div class="premium-navbar__left">
    <button
      type="button"
      class="icon-btn icon-btn--sidebar"
      title="Basculer la sidebar"
      (click)="onToggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <a routerLink="/app/dashboard" class="brand-link" *ngIf="showBrand">
      <div class="brand-mark">TW</div>
      <div class="brand-text">
        <strong>TrustedWork</strong>
        <span>Freelancer Space</span>
      </div>
    </a>
  </div>

  <nav class="premium-navbar__center">
    <div
      class="nav-item"
      *ngFor="let item of navItems"
      [class.has-dropdown]="hasChildren(item)">

      <a
        *ngIf="item.route; else dropdownParent"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link">
        {{ item.label }}
      </a>

      <ng-template #dropdownParent>
        <button type="button" class="nav-link nav-link--button">
          <span>{{ item.label }}</span>
          <i class="fas fa-chevron-down" *ngIf="hasChildren(item)"></i>
        </button>
      </ng-template>

      <div class="dropdown-panel" *ngIf="hasChildren(item)">
        <div class="dropdown-panel__inner">
          <ng-container *ngFor="let child of item.children">
            <a
              *ngIf="!child.disabled; else disabledChild"
              [routerLink]="child.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="dropdown-link">
              <div class="dropdown-link__content">
                <strong>{{ child.label }}</strong>
                <span *ngIf="child.description">{{ child.description }}</span>
              </div>
              <span class="dropdown-badge" *ngIf="child.badge">{{ child.badge }}</span>
            </a>

            <ng-template #disabledChild>
              <div class="dropdown-link dropdown-link--disabled">
                <div class="dropdown-link__content">
                  <strong>{{ child.label }}</strong>
                  <span *ngIf="child.description">{{ child.description }}</span>
                </div>
                <span class="dropdown-badge dropdown-badge--ghost" *ngIf="child.badge">
                  {{ child.badge }}
                </span>
              </div>
            </ng-template>
          </ng-container>
        </div>
      </div>
    </div>
  </nav>

  <div class="premium-navbar__right">
    <button class="icon-btn" type="button" title="Recherche" (click)="toggleSearch()">
      <i class="fas fa-magnifying-glass"></i>
    </button>

    <a
      class="icon-btn"
      routerLink="/app/notifications"
      routerLinkActive="active-icon"
      title="Notifications">
      <i class="fas fa-bell"></i>
      <span class="notif-dot"></span>
    </a>

    <a
      class="icon-btn"
      routerLink="/app/messages"
      routerLinkActive="active-icon"
      title="Messages">
      <i class="fas fa-envelope"></i>
    </a>

    <div class="user-chip">
      <div class="user-chip__avatar">O</div>
      <div class="user-chip__meta">
        <strong>{{ currentUser?.email || 'User' }}</strong>
        <span>Trust --</span>
      </div>
    </div>

    <button
      type="button"
      class="icon-btn icon-btn--logout"
      title="Déconnexion"
      (click)="onLogout()">
      <i class="fas fa-right-from-bracket"></i>
    </button>
  </div>
</header>

<div class="search-overlay" *ngIf="searchOpen" (click)="closeSearch()">
  <div class="search-panel" (click)="$event.stopPropagation()">
    <div class="search-panel__head">
      <strong>Recherche rapide</strong>
      <button type="button" class="search-close" (click)="closeSearch()">
        <i class="fas fa-xmark"></i>
      </button>
    </div>

    <div class="search-panel__input">
      <i class="fas fa-magnifying-glass"></i>
      <input
        type="text"
        [(ngModel)]="searchTerm"
        placeholder="Rechercher une mission, un client, un message..."
        autofocus />
    </div>

    <div class="search-panel__suggestions">
      <a
        *ngFor="let item of quickSearchItems; trackBy: trackByLabel"
        [routerLink]="item.route"
        class="search-suggestion"
        (click)="onQuickNavigate()">
        {{ item.label }}
      </a>
    </div>
  </div>
</div>
