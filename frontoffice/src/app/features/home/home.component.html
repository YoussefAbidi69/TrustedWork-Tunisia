<section class="ds-page">
  <div class="ds-container">
    <ng-container *ngIf="auth.isLoggedIn(); else guestHome">
      <div class="home-grid">
        <aside class="home-grid__left">
          <app-left-user-card />
        </aside>

        <main class="home-grid__center">
          <app-feed />
        </main>

        <aside class="home-grid__right">
          <app-right-widgets />
        </aside>
      </div>
    </ng-container>

    <ng-template #guestHome>
      <div class="guest-home ds-card ds-card-pad">
        <h1 class="ds-title">Welcome to TrustedWork</h1>
        <p class="ds-subtitle">
          Connect with jobs and your professional network in one live workspace.
        </p>

        <div class="guest-home__actions">
          <a routerLink="/auth/login" class="ds-btn ds-btn-outline">Sign in</a>
          <a routerLink="/auth/register" class="ds-btn ds-btn-primary">Register</a>
        </div>
      </div>

      <div class="guest-preview">
        <div class="ds-card ds-card-pad" *ngIf="previewLoading">
          <div class="loader">
            <app-spinner />
          </div>
        </div>

        <div class="ds-card ds-card-pad" *ngIf="previewError">
          <p class="ds-subtitle">{{ previewError }}</p>
        </div>

        <ng-container *ngFor="let item of previewItems; trackBy: trackById">
          <app-home-job-card [job]="item" [interactive]="false" />
        </ng-container>
      </div>
    </ng-template>
  </div>
</section>
