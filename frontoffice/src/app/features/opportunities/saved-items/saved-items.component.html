<div class="saved-page">
  <section class="saved-head premium-card">
    <div>
      <span class="eyebrow">Saved items</span>
      <h1>Your curated shortlist across jobs, events and challenges.</h1>
      <p>
        Keep the most relevant opportunities in one place and come back when you are ready to apply,
        register or continue progressing.
      </p>
    </div>
  </section>

  <section class="saved-grid">
    <article class="saved-card premium-card" *ngFor="let item of items; trackBy: trackByItem">
      <div class="saved-card__top">
        <span class="kind-pill" [ngClass]="getKindClass(item.kind)">
          {{ item.kind }}
        </span>
      </div>

      <h2>{{ item.title }}</h2>
      <p>{{ item.subtitle }}</p>
      <strong>{{ item.meta }}</strong>

      <div class="saved-actions">
        <button type="button" class="btn btn--primary">Open</button>
        <button type="button" class="btn btn--ghost">Remove</button>
      </div>
    </article>
  </section>
</div>
