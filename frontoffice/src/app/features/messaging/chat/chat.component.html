<div class="chat-layout">

  <!-- LEFT SIDEBAR -->
  <div class="chat-sidebar">
    <h2 class="chat-title">Messages</h2>

    <div class="chat-users">
      <div 
        *ngFor="let user of users"
        class="chat-user"
        [ngClass]="{ active: user.id === selectedUserId }"
        (click)="selectUser(user.id)"
      >
        <div class="avatar-wrapper">
          <img [src]="user.avatar" />
          <span class="status" [ngClass]="{ online: user.online }"></span>
        </div>

        <div class="user-info">
          <strong>{{ user.name }}</strong>
          <span class="role">{{ user.role }}</span>
          <p>{{ user.lastMessage }}</p>
        </div>

        <div class="meta">
          <span>{{ user.time }}</span>
          <span *ngIf="user.unreadCount" class="badge">
            {{ user.unreadCount }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-content">

    <!-- HEADER -->
    <div class="chat-header">
      <img [src]="selectedUser.avatar" />
      <div>
        <strong>{{ selectedUser.name }}</strong>
        <span>{{ selectedUser.online ? 'Online' : 'Offline' }}</span>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages">
      <div 
        *ngFor="let msg of messages"
        class="message"
        [ngClass]="{ me: msg.sender === 'me' }"
      >
        <div class="bubble">
          {{ msg.content }}
          <span>{{ msg.time }}</span>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="chat-input">
      <input 
        type="text" 
        placeholder="Type your message..."
        [(ngModel)]="messageText"
        (keyup.enter)="sendMessage()"
      />

      <button (click)="sendMessage()">Send</button>
    </div>

  </div>

</div>
