<div class="auth-card auth-card--compact">
  <div class="auth-card__header">
    <span class="auth-chip">Récupération</span>
    <h2>Mot de passe oublié ?</h2>
    <p>
      Saisissez votre adresse email pour recevoir un lien de réinitialisation.
    </p>
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" novalidate class="auth-form">
    <div class="form-group">
      <label for="email">Adresse email</label>
      <div class="input-shell" [class.input-shell--error]="submitted && f['email'].invalid">
        <input id="email" type="email" formControlName="email" placeholder="vous@trustedwork.tn" />
      </div>
      <small class="field-error" *ngIf="submitted && f['email'].errors?.['required']">
        L'adresse email est obligatoire.
      </small>
      <small class="field-error" *ngIf="submitted && f['email'].errors?.['email']">
        Format email invalide.
      </small>
    </div>

    <div class="form-feedback form-feedback--success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="form-feedback form-feedback--error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" class="submit-btn" [disabled]="loading">
      <span *ngIf="!loading">Envoyer le lien</span>
      <span *ngIf="loading">Envoi en cours...</span>
    </button>
  </form>

  <div class="auth-card__footer">
    <a routerLink="/auth/login">Retour à la connexion</a>
  </div>
</div>
