<div class="two-factor-page">
  <div class="two-factor-card">
    <div class="icon-wrap">
      <div class="icon-circle">2FA</div>
    </div>

    <p class="eyebrow">Sécurité renforcée</p>
    <h1>Vérification à deux facteurs</h1>

    <p class="subtitle">
      Un code de sécurité supplémentaire est requis pour terminer la connexion.
    </p>

    <div class="info-box" *ngIf="email">
      <span class="label">Compte :</span>
      <strong>{{ email }}</strong>
    </div>

    <div class="alert info" *ngIf="infoMessage">
      {{ infoMessage }}
    </div>

    <div class="alert error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label for="otpCode">Code OTP</label>
      <input
        id="otpCode"
        type="text"
        maxlength="6"
        inputmode="numeric"
        [(ngModel)]="code"
        placeholder="Entrer le code à 6 chiffres"
        (keyup.enter)="submit()"
      />
      <small>Le code change automatiquement toutes les 30 secondes.</small>
    </div>

    <div class="actions">
      <button class="btn btn-primary" (click)="submit()" [disabled]="loading">
        <span *ngIf="!loading">Vérifier</span>
        <span *ngIf="loading" class="btn-loader"></span>
      </button>

      <button class="btn btn-secondary" (click)="backToLogin()" [disabled]="loading">
        Retour
      </button>
    </div>
  </div>
</div>
