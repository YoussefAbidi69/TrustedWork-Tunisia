<div class="report-page">
  <div class="page-header">
    <h2>Signaler un avis</h2>
    <p>Signalez un avis inapproprie ou frauduleux.</p>
  </div>

  <div class="form-card">
    <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="reportForm" (ngSubmit)="submitReport()">
      <div class="form-group">
        <label for="reviewId">ID de l'avis a signaler</label>
        <input id="reviewId" type="number" formControlName="reviewId" placeholder="Ex: 12" readonly />
      </div>

      <div class="form-group">
        <label for="motif">Motif du signalement</label>
        <select id="motif" formControlName="motif">
          <option value="" disabled>Choisir un motif...</option>
          <option value="SPAM">Spam</option>
          <option value="FAKE_REVIEW">Faux avis</option>
          <option value="ABUSIVE_LANGUAGE">Langage abusif</option>
          <option value="IRRELEVANT">Hors sujet</option>
          <option value="OTHER">Autre</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description (optionnel)</label>
        <textarea id="description" formControlName="description" rows="4" placeholder="Decrivez le probleme..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-danger" [disabled]="loading || reportForm.invalid">
          {{ loading ? 'Envoi...' : 'Envoyer le signalement' }}
        </button>

        <button type="button" class="btn-secondary" (click)="resetForm()">Annuler</button>
      </div>
    </form>
  </div>
</div>
