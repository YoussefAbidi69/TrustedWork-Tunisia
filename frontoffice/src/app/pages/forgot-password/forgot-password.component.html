<div class="auth-container">
  <div class="auth-card">
    <h2>Mot de passe oublié</h2>
    <p class="subtitle">
      Entrez votre email pour recevoir un lien de réinitialisation.
    </p>

    <div class="alert success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="alert error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="exemple@email.com"
      />
    </div>

    <button
      class="primary-btn"
      (click)="submit()"
      [disabled]="loading"
    >
      {{ loading ? 'Envoi...' : 'Envoyer' }}
    </button>

    <div class="reset-preview" *ngIf="resetToken">
      <p class="helper-text">
        Un email de réinitialisation a été envoyé. Vérifiez votre boîte de réception et vos spams.
      </p>

      <h3>Lien direct (démo)</h3>
      <div class="link-box">
        <a [routerLink]="['/reset-password']" [queryParams]="{ token: resetToken }">
          Ouvrir la page de réinitialisation
        </a>
      </div>
    </div>

    <div class="back-link">
      <a routerLink="/login">← Retour à la connexion</a>
    </div>
  </div>
</div>
