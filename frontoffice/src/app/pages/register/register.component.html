<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <div class="logo-icon">TW</div>
      <h1>TrustedWork</h1>
      <p>Créer votre compte</p>
    </div>

    <div class="error-box" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- CIN (NOUVEAU) -->
      <div class="form-group">
        <label>CIN <span class="required">*</span></label>
        <input type="number" formControlName="cin"
               placeholder="Ex: 12345678"
               [class.invalid]="form.get('cin')?.invalid && form.get('cin')?.touched"/>
        <span class="field-error"
              *ngIf="form.get('cin')?.invalid && form.get('cin')?.touched">
          CIN requis (8 chiffres)
        </span>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Prénom <span class="required">*</span></label>
          <input type="text" formControlName="firstName" placeholder="Ahmed"/>
        </div>
        <div class="form-group">
          <label>Nom <span class="required">*</span></label>
          <input type="text" formControlName="lastName" placeholder="Ben Ali"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" formControlName="email" placeholder="ahmed@email.com"/>
      </div>

      <div class="form-group">
        <label>Mot de passe <span class="required">*</span></label>
        <input type="password" formControlName="password" placeholder="Minimum 8 caractères"/>
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" formControlName="phoneNumber" placeholder="21 234 567"/>
      </div>

      <div class="form-group">
        <label>Je suis <span class="required">*</span></label>
        <select formControlName="role">
          <option value="FREELANCER">Freelancer</option>
          <option value="CLIENT">Client</option>
        </select>
      </div>

      <!-- PHOTO DE PROFIL (NOUVEAU) -->
      <div class="form-group">
        <label>Photo de profil <span class="optional">(optionnel)</span></label>

        <!-- Prévisualisation -->
        <div class="photo-upload-area" *ngIf="photoPreviewUrl">
          <div class="photo-preview">
            <img [src]="photoPreviewUrl" alt="Photo de profil"/>
            <button type="button" class="photo-remove-btn" (click)="removePhoto()">✕</button>
          </div>
          <span class="photo-filename">{{ form.get('photo')?.value }}</span>
        </div>

        <!-- Zone upload si pas de photo -->
        <label class="photo-drop-zone" *ngIf="!photoPreviewUrl">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Choisir une photo</span>
          <small>Le fichier doit être placé dans <code>htdocs/images/</code></small>
          <input type="file" accept="image/*" (change)="onPhotoSelected($event)" style="display:none"/>
        </label>
      </div>

      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Inscription...' : 'Créer mon compte' }}
      </button>
    </form>

    <div class="register-footer">
      Déjà un compte ?<a routerLink="/login">Se connecter</a>
    </div>
  </div>
</div>
