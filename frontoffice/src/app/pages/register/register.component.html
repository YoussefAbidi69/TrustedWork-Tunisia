<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <div class="logo-icon">TW</div>
      <h1>TrustedWork</h1>
      <p>Créer votre compte</p>
    </div>

    <div class="error-box" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" formControlName="firstName" placeholder="Ahmed">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" formControlName="lastName" placeholder="Ben Ali">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="ahmed@email.com">
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="Minimum 8 caractères">
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" formControlName="phoneNumber" placeholder="21 234 567">
      </div>

      <div class="form-group">
        <label>Je suis</label>
        <select formControlName="role">
          <option value="FREELANCER">Freelancer</option>
          <option value="CLIENT">Client</option>
        </select>
      </div>

      <button type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Inscription...' : 'Créer mon compte' }}
      </button>
    </form>

    <div class="register-footer">
      Déjà un compte ?<a routerLink="/login">Se connecter</a>
    </div>
  </div>
</div>
