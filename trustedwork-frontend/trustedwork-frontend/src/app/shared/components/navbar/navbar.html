<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <i class="bi bi-shield-check"></i> TrustedWork
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/contracts" routerLinkActive="active">
            <i class="bi bi-file-text"></i> Contrats
          </a>
        </li>

        <!-- ✅ Portefeuille - Freelancer uniquement -->
        <li class="nav-item" *ngIf="authService.getRole() === 'FREELANCER' || authService.getRole() === 'ADMIN'">
          <a class="nav-link" routerLink="/wallet" routerLinkActive="active">
            <i class="bi bi-wallet2"></i> Portefeuille
          </a>
        </li>
        
        <!-- ✅ Paiement - Client uniquement -->
        <li class="nav-item" *ngIf="authService.getRole() === 'CLIENT' || authService.getRole() === 'ADMIN'">
          <a class="nav-link" routerLink="/payment/checkout/1" routerLinkActive="active">
            <i class="bi bi-credit-card"></i> Paiement
          </a>
        </li>

        <!-- ✅ Utilisateurs (Admin) -->
        <li class="nav-item" *ngIf="authService.getRole() === 'ADMIN'">
          <a class="nav-link" routerLink="/users" routerLinkActive="active">
            <i class="bi bi-people"></i> Utilisateurs
          </a>
        </li>

        <!-- Connexion / Déconnexion -->
        <li class="nav-item" *ngIf="!authService.isLoggedIn()">
          <a class="nav-link" routerLink="/login" routerLinkActive="active">
            <i class="bi bi-box-arrow-in-right"></i> Connexion
          </a>
        </li>
        <li class="nav-item" *ngIf="authService.isLoggedIn()">
          <a class="nav-link" style="cursor:pointer;" (click)="authService.logout()">
            <i class="bi bi-box-arrow-right"></i> Déconnexion ({{ authService.getRole() }})
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
