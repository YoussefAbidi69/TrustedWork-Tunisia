<div class="table-wrapper">
    <!-- Loading State -->
    <div class="table-loading" *ngIf="loading">
        <div class="spinner"></div>
        <span>Loading data...</span>
    </div>

    <!-- Empty State -->
    <div class="table-empty" *ngIf="!loading && data.length === 0">
        <span class="empty-icon">📭</span>
        <p>No records found.</p>
    </div>

    <!-- Table -->
    <table *ngIf="!loading && data.length > 0">
        <thead>
            <tr>
                <th *ngFor="let col of columns">{{ col.label }}</th>
                <th class="actions-col">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let row of data" class="animate-fade-in">
                <td *ngFor="let col of columns">
                    <!-- Badge Type -->
                    <app-status-badge *ngIf="col.type === 'badge'" [status]="getValue(row, col.key)"></app-status-badge>

                    <!-- Date Type -->
                    <span *ngIf="col.type === 'date'">
                        {{ getValue(row, col.key) | date:'mediumDate' }}
                    </span>

                    <!-- Currency Type -->
                    <span *ngIf="col.type === 'currency'" class="currency">
                        {{ getValue(row, col.key) | currency:'TND':'symbol':'1.0-0' }}
                    </span>

                    <!-- Default Text -->
                    <span *ngIf="!col.type || col.type === 'text'">
                        {{ getValue(row, col.key) }}
                    </span>
                </td>
                <td class="actions-cell">
                    <button class="action-btn view" (click)="onView.emit(row)" title="View">
                        👁
                    </button>

                </td>
            </tr>
        </tbody>
    </table>
</div>
