<div class="page animate-fade-in">
    <app-recruitment-card title="Contrats par Entreprise" subtitle="Tous les contrats d'embauche d'une entreprise"
        icon="🏢" [padding]="false">

        <div class="search-bar">
            <input type="number" class="search-input" [(ngModel)]="entrepriseId" placeholder="Entrer Entreprise ID..."
                min="1" (keydown.enter)="search()" />
            <select class="filter-select" *ngIf="contracts.length > 0"
                (change)="onFilterType($any($event.target).value)">
                <option *ngFor="let t of typeOptions" [value]="t">{{ t || 'Tous les types' }}</option>
            </select>
            <select class="filter-select" *ngIf="contracts.length > 0"
                (change)="onFilterStatus($any($event.target).value)">
                <option *ngFor="let s of statusOptions" [value]="s">{{ s || 'Tous les statuts' }}</option>
            </select>
            <app-button-primary icon="🔍" (onClick)="search()" [loading]="loading">
                Rechercher
            </app-button-primary>
        </div>

        <div class="results-info" *ngIf="contracts.length > 0">
            <span>{{ filtered.length }} / {{ contracts.length }} contrat(s)</span>
        </div>

        <div class="empty-state" *ngIf="searched && !loading && contracts.length === 0">
            <span>Aucun contrat pour l'entreprise #{{ entrepriseId }}</span>
        </div>
        <div class="empty-state" *ngIf="!searched">
            <span>🏢 Entrez un Entreprise ID pour voir ses contrats</span>
        </div>

        <app-recruitment-table *ngIf="filtered.length > 0" [columns]="columns" [data]="filtered" [loading]="loading"
            (onView)="onView($event)">
        </app-recruitment-table>

    </app-recruitment-card>
</div>
